name: Startwork upstream tag sync

on:
  schedule:
    - cron: '17 */6 * * *'
  workflow_dispatch:
    inputs:
      upstream_tag:
        description: 'Official Sub2API tag to sync. Empty means latest semver-like tag.'
        required: false
        type: string

permissions:
  contents: write
  issues: write

jobs:
  sync-upstream-tag:
    runs-on: ubuntu-latest
    env:
      REQUESTED_UPSTREAM_TAG: ${{ github.event.inputs.upstream_tag }}
      FEISHU_WEBHOOK: ${{ secrets.STARTWORK_FEISHU_WEBHOOK }}
    steps:
      - name: Checkout Startwork fork
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Sync latest upstream tag branch
        id: sync
        shell: bash
        run: |
          bash .github/scripts/startwork-upstream-sync.sh

      - name: Create conflict issue
        if: steps.sync.outputs.status == 'conflict'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const tag = '${{ steps.sync.outputs.target_tag }}';
            const branch = '${{ steps.sync.outputs.target_branch }}';
            const patchSourceBranch = '${{ steps.sync.outputs.patch_source_branch }}' || '(none)';
            const conflictCommit = '${{ steps.sync.outputs.conflict_commit }}';
            const conflictFile = '${{ steps.sync.outputs.conflict_file }}';
            const conflicts = conflictFile && fs.existsSync(conflictFile)
              ? fs.readFileSync(conflictFile, 'utf8').trim()
              : '';
            const body = [
              `自动同步上游 tag \`${tag}\` 时应用 Startwork patch 发生冲突。`,
              '',
              `目标分支：\`${branch}\``,
              `补丁来源：\`${patchSourceBranch}\``,
              `冲突提交：\`${conflictCommit}\``,
              '',
              '冲突文件：',
              '',
              '```',
              conflicts || '(workflow did not capture conflict files)',
              '```',
              '',
              '需要人工处理后再继续生产更新。'
            ].join('\n');
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `上游 Sub2API ${tag} 同步冲突`,
              body,
              labels: ['upstream-sync', 'blocked']
            });

      - name: Fail on conflict
        if: steps.sync.outputs.status == 'conflict'
        run: exit 1

      - name: Send Feishu notification
        if: steps.sync.outputs.status == 'created' && env.FEISHU_WEBHOOK != ''
        shell: bash
        run: |
          set -euo pipefail
          msg=$(python3 -c 'import json, os; text = "\n".join(["✅ Sub2API 上游同步成功!", f"📦 Tag: {os.environ[\"TARGET_TAG\"]}", f"🌿 分支: {os.environ[\"TARGET_BRANCH\"]}", f"🔀 补丁来源: {os.environ.get(\"PATCH_SOURCE_BRANCH\") or \"none\"}", f"🧩 Patch 数量: {os.environ[\"PATCH_COMMIT_COUNT\"]}", f"📝 提交: {os.environ[\"BRANCH_HEAD\"][:7]}"]); print(json.dumps({"msg_type": "text", "content": {"text": text}}, ensure_ascii=False))')
          curl -sS -X POST -H "Content-Type: application/json" -d "$msg" "$FEISHU_WEBHOOK"
        env:
          TARGET_TAG: ${{ steps.sync.outputs.target_tag }}
          TARGET_BRANCH: ${{ steps.sync.outputs.target_branch }}
          PATCH_SOURCE_BRANCH: ${{ steps.sync.outputs.patch_source_branch }}
          PATCH_COMMIT_COUNT: ${{ steps.sync.outputs.patch_commit_count }}
          BRANCH_HEAD: ${{ steps.sync.outputs.branch_head }}

      - name: Build summary
        shell: bash
        run: |
          {
            echo "## Startwork upstream sync result"
            echo
            echo "- Status: \`${{ steps.sync.outputs.status }}\`"
            echo "- Upstream tag: \`${{ steps.sync.outputs.target_tag }}\`"
            echo "- Target branch: \`${{ steps.sync.outputs.target_branch }}\`"
            echo "- Patch source: \`${{ steps.sync.outputs.patch_source_branch || 'none' }}\`"
            echo "- Patch commit count: \`${{ steps.sync.outputs.patch_commit_count || '0' }}\`"
            echo "- Branch head: \`${{ steps.sync.outputs.branch_head || 'n/a' }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
