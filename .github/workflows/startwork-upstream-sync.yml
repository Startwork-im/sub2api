name: Startwork upstream tag sync

on:
  schedule:
    - cron: '17 */6 * * *'
  workflow_dispatch:
    inputs:
      upstream_tag:
        description: 'Official Sub2API tag to sync. Empty means latest semver-like tag.'
        required: false
        type: string

permissions:
  contents: write
  pull-requests: write
  issues: write
  actions: write

jobs:
  sync-upstream-tag:
    runs-on: ubuntu-latest
    env:
      REQUESTED_UPSTREAM_TAG: ${{ github.event.inputs.upstream_tag }}
    steps:
      - name: Checkout Startwork fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Configure git identity
        run: |
          git config user.name 'startwork-sub2api-sync[bot]'
          git config user.email 'startwork-sub2api-sync@users.noreply.github.com'

      - name: Resolve upstream tag and target branch
        id: resolve
        shell: bash
        run: |
          set -euo pipefail
          git remote add upstream https://github.com/Wei-Shaw/sub2api.git 2>/dev/null || git remote set-url upstream https://github.com/Wei-Shaw/sub2api.git
          git fetch upstream --tags --force
          git fetch origin --prune
          tag="$REQUESTED_UPSTREAM_TAG"
          if [ -z "$tag" ]; then
            tag=$(git tag -l 'v*' | sort -V | tail -n 1 || true)
          fi
          if [ -z "$tag" ]; then
            echo 'No upstream tag found' >&2
            exit 1
          fi

          branch="upstream-${tag}"
          legacy_branch="sync/upstream-${tag}"
          version="${tag#v}"
          base_branch="origin/main"

          if git ls-remote --exit-code --heads origin "$branch" >/dev/null 2>&1; then
            base_branch="origin/${branch}"
            target_exists=true
          else
            target_exists=false
            if git ls-remote --exit-code --heads origin "$legacy_branch" >/dev/null 2>&1; then
              base_branch="origin/${legacy_branch}"
            else
              while IFS= read -r existing_branch; do
                [ -n "$existing_branch" ] || continue
                existing_version="${existing_branch#origin/upstream-v}"
                if [ "$existing_version" = "$version" ]; then
                  continue
                fi
                if [ "$(printf '%s\n%s\n' "$existing_version" "$version" | sort -V | tail -n 1)" = "$version" ]; then
                  base_branch="$existing_branch"
                fi
              done < <(git for-each-ref --sort=version:refname --format='%(refname:short)' 'refs/remotes/origin/upstream-v*')
            fi
          fi

          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "branch=$branch" >> "$GITHUB_OUTPUT"
          echo "base_branch=$base_branch" >> "$GITHUB_OUTPUT"
          echo "target_exists=$target_exists" >> "$GITHUB_OUTPUT"

      - name: Merge upstream tag
        id: merge
        shell: bash
        run: |
          set +e
          git checkout -B '${{ steps.resolve.outputs.branch }}' '${{ steps.resolve.outputs.base_branch }}'
          before_sha=$(git rev-parse HEAD)
          git merge --no-edit '${{ steps.resolve.outputs.tag }}'
          rc=$?
          if [ $rc -ne 0 ]; then
            git diff --name-only --diff-filter=U > /tmp/sub2api-conflicts.txt || true
            echo 'conflicted=true' >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo 'conflicted=false' >> "$GITHUB_OUTPUT"
          after_sha=$(git rev-parse HEAD)
          push_required=false
          if [ '${{ steps.resolve.outputs.target_exists }}' != 'true' ] || [ "$before_sha" != "$after_sha" ]; then
            push_required=true
            git push origin '${{ steps.resolve.outputs.branch }}'
          fi
          echo "push_required=$push_required" >> "$GITHUB_OUTPUT"
          echo "before_sha=$before_sha" >> "$GITHUB_OUTPUT"
          echo "after_sha=$after_sha" >> "$GITHUB_OUTPUT"

      - name: Create conflict issue
        if: steps.merge.outputs.conflicted == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const tag = '${{ steps.resolve.outputs.tag }}';
            const conflicts = fs.existsSync('/tmp/sub2api-conflicts.txt')
              ? fs.readFileSync('/tmp/sub2api-conflicts.txt', 'utf8').trim()
              : '';
            const body = [
              `自动同步上游 tag \`${tag}\` 时发生 merge conflict。`,
              '',
              '冲突文件：',
              '',
              '```',
              conflicts || '(workflow did not capture conflict files)',
              '```',
              '',
              '生产镜像发布和部署已阻断，需要人工处理。'
            ].join('\n');
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `上游 Sub2API ${tag} 同步冲突`,
              body,
              labels: ['upstream-sync', 'blocked']
            });

      - name: Fail on conflict
        if: steps.merge.outputs.conflicted == 'true'
        run: exit 1

      - name: Create sync pull request
        if: steps.resolve.outputs.target_exists != 'true' && steps.merge.outputs.conflicted == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            const tag = '${{ steps.resolve.outputs.tag }}';
            const branch = '${{ steps.resolve.outputs.branch }}';
            try {
              await github.rest.pulls.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `同步上游 Sub2API ${tag}`,
                head: branch,
                base: 'main',
                body: `自动合并上游 Sub2API tag \`${tag}\` 到 Startwork 维护分支。目标运行时分支 \`${branch}\` 会在新提交时继续自动触发构建。`
              });
            } catch (error) {
              if (error.status === 422) {
                core.info('Pull request already exists or branch has no diff.');
                return;
              }
              if (error.status === 403) {
                core.warning(`GitHub Actions cannot create pull requests in this repository. The target branch ${branch} was pushed successfully; create or merge the PR manually if needed.`);
                return;
              }
              throw error;
            }

      - name: Sync summary
        if: always()
        shell: bash
        run: |
          {
            echo '## Startwork upstream sync'
            echo
            echo "- Upstream tag: \`${{ steps.resolve.outputs.tag }}\`"
            echo "- Target branch: \`${{ steps.resolve.outputs.branch }}\`"
            echo "- Base branch: \`${{ steps.resolve.outputs.base_branch }}\`"
            echo "- Target existed: \`${{ steps.resolve.outputs.target_exists }}\`"
            echo "- Merge conflicted: \`${{ steps.merge.outputs.conflicted || 'false' }}\`"
            echo "- Branch pushed: \`${{ steps.merge.outputs.push_required || 'false' }}\`"
            echo "- Auto build path: \`push trigger on startwork-docker-release.yml\`"
            echo "- Before: \`${{ steps.merge.outputs.before_sha || 'n/a' }}\`"
            echo "- After: \`${{ steps.merge.outputs.after_sha || 'n/a' }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
