name: Startwork Docker build and optional release

on:
  push:
    branches:
      - main
      - 'upstream-v*'
      - 'sync/upstream-*'
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Extra Docker image tag. Defaults to git-<sha>.'
        required: false
        type: string
      push_image:
        description: 'Push image to Docker Hub when Docker Hub secrets exist.'
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  packages: read

concurrency:
  group: startwork-sub2api-build-${{ github.ref }}
  cancel-in-progress: false

env:
  IMAGE_NAME: startwork/sub2api

jobs:
  build-and-maybe-push:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
      image_ref: ${{ steps.meta.outputs.image_ref }}
      image_pushed: ${{ steps.push_decision.outputs.image_pushed }}
    env:
      REQUESTED_IMAGE_TAG: ${{ github.event.inputs.image_tag }}
      REQUESTED_PUSH_IMAGE: ${{ github.event.inputs.push_image }}
      DOCKERHUB_USERNAME_VALUE: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN_VALUE: ${{ secrets.DOCKERHUB_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve image metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          branch_name="${GITHUB_HEAD_REF:-${GITHUB_REF#refs/heads/}}"
          branch_tag="${branch_name//\//-}"
          short_sha="${GITHUB_SHA::7}"
          tag="$REQUESTED_IMAGE_TAG"
          if [ -z "$tag" ]; then
            tag="git-${short_sha}"
          fi
          upstream_tag=$(git tag --points-at HEAD | sort -V | tail -n 1 || true)
          labels="org.opencontainers.image.revision=${GITHUB_SHA},org.opencontainers.image.created=$(date -u +%FT%TZ)"
          if [ -n "$upstream_tag" ]; then
            labels="$labels,im.startwork.upstream_tag=$upstream_tag"
          fi
          echo "image_tag=$tag" >> "$GITHUB_OUTPUT"
          echo "image_ref=${IMAGE_NAME}:$tag" >> "$GITHUB_OUTPUT"
          echo "branch_tag=$branch_tag" >> "$GITHUB_OUTPUT"
          echo "labels=$labels" >> "$GITHUB_OUTPUT"
          {
            echo 'push_tags<<EOF'
            echo "${IMAGE_NAME}:$tag"
            echo "${IMAGE_NAME}:$branch_tag"
            if [ "$branch_name" = "main" ]; then
              echo "${IMAGE_NAME}:latest"
            fi
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Decide push mode
        id: push_decision
        shell: bash
        run: |
          set -euo pipefail
          can_push=false
          reason="not_main_or_not_requested"
          branch_name="${GITHUB_HEAD_REF:-${GITHUB_REF#refs/heads/}}"
          release_branch=false
          if [ "${GITHUB_REF}" = "refs/heads/main" ] || [[ "$branch_name" == upstream-v* ]]; then
            release_branch=true
          fi
          if [ "$release_branch" = true ]; then
            if [ "${GITHUB_EVENT_NAME}" = "push" ] || [ "$REQUESTED_PUSH_IMAGE" = "true" ]; then
              if [ -n "$DOCKERHUB_USERNAME_VALUE" ] && [ -n "$DOCKERHUB_TOKEN_VALUE" ]; then
                can_push=true
                reason="dockerhub_secrets_present"
              else
                reason="dockerhub_secrets_missing"
              fi
            fi
          fi
          echo "can_push=$can_push" >> "$GITHUB_OUTPUT"
          echo "image_pushed=false" >> "$GITHUB_OUTPUT"
          echo "Push decision: $can_push ($reason)"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image without pushing
        if: steps.push_decision.outputs.can_push != 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: ${{ steps.meta.outputs.push_tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Login to Docker Hub
        if: steps.push_decision.outputs.can_push == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        if: steps.push_decision.outputs.can_push == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.push_tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Mark image pushed
        if: steps.push_decision.outputs.can_push == 'true'
        id: pushed
        shell: bash
        run: |
          echo "image_pushed=true" >> "$GITHUB_OUTPUT"
          echo "Pushed ${{ steps.meta.outputs.image_ref }}"

      - name: Build summary
        shell: bash
        run: |
          {
            echo '## Startwork Sub2API build'
            echo
            echo "- Image ref: \`${{ steps.meta.outputs.image_ref }}\`"
            echo "- Branch: \`${GITHUB_REF}\`"
            echo "- Event: \`${GITHUB_EVENT_NAME}\`"
            echo "- Branch tag: \`${{ steps.meta.outputs.branch_tag }}\`"
            echo "- Docker push enabled: \`${{ steps.push_decision.outputs.can_push }}\`"
            if [ "${{ steps.push_decision.outputs.can_push }}" != "true" ]; then
              echo "- Docker push skipped: missing Docker Hub secrets, non-release branch, PR, or push not requested."
            fi
          } >> "$GITHUB_STEP_SUMMARY"
